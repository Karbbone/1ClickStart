<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 160 160" fill="none">
  <!-- Rounded square container -->
  <rect x="20" y="25" width="95" height="95" rx="18" stroke="#e0e0e0" stroke-width="3" fill="none"/>
  <!-- Chevron prompt > -->
  <path d="M38 57 L58 72 L38 87" stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Full mouse cursor -->
  <polygon points="78,42 78,82 88,74 98,92 103,89 93,71 104,64" fill="none" stroke="#e0e0e0" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Click dot -->
  <circle cx="78" cy="42" r="4" fill="#4ade80"/>
</svg>